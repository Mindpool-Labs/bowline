name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BOWLINE_SOURCE_REVISION: ${{ github.sha }}

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo +1.95.0 check --workspace --all-targets
      - run: cargo test --workspace
      - run: python3 -m unittest integrations/litellm/test_bowline_callback.py -v
      # Reference conformance checks: prove the shipped collector profile/fixture pairs validate
      # via the same offline runner a third-party collector author would use. This is a
      # serializer/formatter-output contract check against a synthetic fixture, not a live
      # LiteLLM or Envoy integration test (see integrations/*/README.md).
      - run: cargo run -p bowline -- conformance collector --profile integrations/litellm/profile.yaml --input integrations/litellm/fixture.jsonl
      - run: cargo run -p bowline -- conformance collector --profile integrations/envoy/profile.yaml --input integrations/envoy/fixture.jsonl
      - run: cargo install cargo-deny --locked
      - run: cargo deny check
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-docs.sh
      - run: ./scripts/check-deployment.sh
      - run: ./scripts/check-repo.sh

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/docker-smoke.sh
