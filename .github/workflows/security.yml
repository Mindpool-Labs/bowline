name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version=8.30.1
          archive="gitleaks_${version}_linux_x64.tar.gz"
          curl --fail --silent --show-error --location \
            --output "$RUNNER_TEMP/$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${version}/$archive"
          printf '%s  %s\n' \
            '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb' \
            "$RUNNER_TEMP/$archive" | sha256sum --check --strict
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" version
      - name: Scan exact checkout bytes
        run: |
          "$RUNNER_TEMP/gitleaks" dir . --config .gitleaks.toml --redact --no-banner

  rustsec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - run: cargo install cargo-deny --locked
      - run: cargo deny check
      - run: cargo install cargo-audit --locked
      - run: cargo audit
